<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Iron Journal">
<meta name="theme-color" content="#0A0A0A">
<meta name="description" content="Iron Journal - 本地优先的力量训练记录工具">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%230A0A0A'/%3E%3Ctext x='90' y='115' font-family='Arial Black' font-size='90' fill='%23D4FF3A' text-anchor='middle' font-weight='900'%3EIJ%3C/text%3E%3C/svg%3E">
<title>Iron Journal Shift Coach Pro</title>
<style>
  :root {
    --accent: #D4FF3A;
    --accent-dim: #9FBF2C;
    --bg: #0A0A0A;
    --surface: #141414;
    --surface-2: #1E1E1E;
    --border: #2A2A2A;
    --text-dim: #8A8A8A;
    --danger: #FF6B6B;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: #fff;
    font-family: 'Inter', -apple-system, sans-serif;
    overscroll-behavior: none;
    min-height: 100vh;
  }
  body {
    padding-bottom: calc(100px + env(safe-area-inset-bottom));
    padding-top: env(safe-area-inset-top);
  }
  button, input { font-family: inherit; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  ::-webkit-scrollbar { width: 0; }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card-anim { animation: slideUp 0.3s ease-out; }
  .tap { transition: transform 0.1s, background 0.15s; cursor: pointer; }
  .tap:active { transform: scale(0.97); }

  .header {
    padding: 20px 20px 20px;
    border-bottom: 1px solid var(--border);
  }
  .header-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--accent);
    letter-spacing: 0.3em; margin-bottom: 6px;
  }
  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px; margin: 0; line-height: 1;
    letter-spacing: 0.02em;
  }
  .header h1 span { color: var(--accent); }

  .container { padding: 20px; }

  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px;
  }
  .stat-label {
    color: var(--text-dim); font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.15em; margin-bottom: 8px;
  }
  .stat-value {
    display: flex; align-items: baseline; gap: 4px;
  }
  .stat-value .v {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; line-height: 1;
  }
  .stat-value .s { color: var(--text-dim); font-size: 12px; }

  .section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-dim);
    letter-spacing: 0.25em; margin: 8px 0 12px;
    text-transform: uppercase;
  }

  .btn-primary {
    width: 100%; background: var(--accent); color: #000;
    border: none; border-radius: 16px; padding: 20px;
    font-size: 16px; font-weight: 700; letter-spacing: 0.05em;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-secondary {
    background: var(--surface); color: #fff; border: 1px solid var(--border);
    border-radius: 14px; padding: 16px;
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; text-align: left;
  }

  .workout-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px; margin-bottom: 10px;
    width: 100%; text-align: left; color: #fff;
    display: flex; align-items: center; justify-content: space-between;
  }

  .empty-card {
    background: var(--surface); border: 1px dashed var(--border);
    border-radius: 16px; padding: 32px 20px; text-align: center;
    color: var(--text-dim); font-size: 13px;
  }

  nav.bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(10,10,10,0.92);
    -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: grid; grid-template-columns: repeat(5, 1fr);
    padding: 10px 8px calc(10px + env(safe-area-inset-bottom));
    z-index: 50;
  }
  nav.bottom-nav button {
    background: none; border: none; color: var(--text-dim);
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 8px 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.15em;
  }
  nav.bottom-nav button.active { color: var(--accent); }
  nav.bottom-nav svg { width: 20px; height: 20px; }

  .exercise-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px; margin-bottom: 12px;
  }
  .ex-header {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 12px;
  }
  .ex-name { font-weight: 600; font-size: 16px; }
  .ex-target {
    font-size: 11px; color: var(--accent-dim);
    font-family: 'JetBrains Mono', monospace; margin-top: 2px;
  }

  .set-header {
    display: grid; grid-template-columns: 32px 1fr 1fr 32px; gap: 8px;
    font-size: 10px; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.15em; margin-bottom: 6px; padding: 0 4px;
  }
  .set-row {
    display: grid; grid-template-columns: 32px 1fr 1fr 32px;
    gap: 8px; align-items: center; margin-bottom: 6px;
  }
  .set-num {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent); font-weight: 700;
    text-align: center; font-size: 14px;
  }
  .input-num {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; color: #fff; font-size: 15px;
    font-family: 'JetBrains Mono', monospace;
    text-align: center; outline: none; width: 100%;
  }
  .input-num:focus { border-color: var(--accent); }

  .btn-add-set {
    width: 100%; background: var(--surface-2); border: 1px dashed var(--border);
    border-radius: 10px; padding: 10px;
    color: var(--accent); font-size: 13px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 4px;
  }

  .btn-add-exercise {
    width: 100%; background: transparent; border: 1px dashed var(--border);
    border-radius: 16px; padding: 18px;
    color: var(--accent); font-weight: 600; font-size: 15px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }

  .icon-btn {
    background: none; border: none; color: var(--text-dim);
    padding: 4px;
  }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: flex-end; z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .modal {
    background: var(--surface); width: 100%;
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 32px;
    max-height: 75vh; overflow-y: auto;
  }
  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border); border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px; margin: 0 0 16px;
    letter-spacing: 0.02em;
  }

  .exercise-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .exercise-grid button {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 12px;
    color: #fff; font-size: 14px; font-weight: 500; text-align: left;
  }

  .name-input {
    width: 100%; background: transparent; border: none;
    font-family: 'Bebas Neue', sans-serif; font-size: 36px;
    color: #fff; outline: none; margin-bottom: 20px;
    letter-spacing: 0.02em;
  }

  .session-top {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 20px;
  }
  .btn-cancel {
    background: none; border: none; color: var(--text-dim);
    display: flex; align-items: center; gap: 4px;
    font-size: 14px; padding: 0;
  }
  .btn-save-sm {
    background: var(--accent); color: #000;
    border: none; border-radius: 10px; padding: 10px 16px;
    font-weight: 700; display: flex; align-items: center; gap: 4px;
    font-size: 14px;
  }
  .btn-save-sm:disabled { background: var(--surface-2); color: var(--text-dim); }

  /* Charts */
  .chart-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px; margin-bottom: 20px;
  }
  .chart-label {
    color: var(--text-dim); font-size: 11px;
    letter-spacing: 0.2em; margin-bottom: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  canvas { width: 100% !important; height: 200px !important; }

  .ex-list-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; color: #fff; text-align: left;
  }

  .history-row {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px; margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center;
  }

  .back-btn {
    background: none; border: none; color: var(--accent);
    margin-bottom: 16px; font-size: 14px; padding: 0;
  }

  .weight-current {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 20px;
  }
  .weight-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px; line-height: 1;
    display: flex; align-items: baseline; gap: 6px;
  }
  .weight-big .kg {
    font-size: 16px; color: var(--text-dim);
    font-family: 'Inter', sans-serif;
  }

  .input-text {
    width: 100%; background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; color: #fff; font-size: 18px;
    font-family: 'JetBrains Mono', monospace;
    text-align: center; outline: none; margin-bottom: 12px;
  }

  .template-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px; margin-bottom: 12px;
  }
  .tpl-ex-row {
    font-size: 13px; color: #ccc;
    display: flex; justify-content: space-between;
    padding: 4px 0;
  }
  .tpl-ex-row + .tpl-ex-row { border-top: 1px solid var(--border); }
  .tpl-ex-row .reps {
    color: var(--accent-dim);
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }

  .btn-use-tpl {
    width: 100%; background: var(--surface-2); color: var(--accent);
    border: 1px solid var(--accent); border-radius: 10px; padding: 10px;
    font-weight: 600; font-size: 13px;
    display: flex; align-items: center; justify-content: center; gap: 4px;
    margin-top: 12px;
  }

  /* FIX #11: data-actions 改为三列 */
  .data-actions {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 24px;
  }
  .btn-data {
    background: var(--surface); color: #fff; border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 8px; font-weight: 600; font-size: 12px;
    text-align: center;
  }
  .data-note {
    color: var(--text-dim); font-size: 11px; line-height: 1.6; margin-top: 10px;
  }

  .install-hint {
    background: var(--surface); border: 1px solid var(--accent);
    border-radius: 12px; padding: 12px 14px; margin-bottom: 16px;
    font-size: 12px; color: var(--accent-dim);
    display: flex; gap: 10px; align-items: flex-start;
  }
  .install-hint button {
    background: none; border: none; color: var(--accent);
    font-size: 16px; padding: 0; margin-left: auto;
  }

  /* Coach Edition */
  .coach-card {
    background: linear-gradient(135deg, rgba(212,255,58,0.14), rgba(20,20,20,1) 52%);
    border: 1px solid rgba(212,255,58,0.38);
    border-radius: 18px;
    padding: 16px;
    margin-bottom: 24px;
  }
  .coach-kicker {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px; letter-spacing: 0.22em;
    color: var(--accent); margin-bottom: 8px;
  }
  .coach-title {
    font-family: 'Bebas Neue', Impact, 'Arial Narrow Bold', sans-serif;
    font-size: 30px; line-height: 1; margin-bottom: 8px;
  }
  .coach-desc { color: #cfcfcf; font-size: 13px; line-height: 1.55; margin-bottom: 14px; }
  .coach-meta { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .coach-pill { background: rgba(0,0,0,0.22); border: 1px solid var(--border); border-radius: 12px; padding: 10px 8px; }
  .coach-pill .l { color: var(--text-dim); font-size: 10px; font-family:'JetBrains Mono', monospace; letter-spacing:0.12em; margin-bottom:4px; }
  .coach-pill .v { color: #fff; font-weight: 700; font-size: 13px; }
  .coach-actions { display:grid; grid-template-columns: 1fr; gap: 8px; }
  .coach-secondary { background: transparent; color: var(--accent); border: 1px solid rgba(212,255,58,0.45); border-radius: 14px; padding: 13px; font-weight: 700; }
  .coach-tip {
    background: rgba(212,255,58,0.08); border: 1px solid rgba(212,255,58,0.18);
    color: #dfffa0; border-radius: 10px; padding: 8px 10px;
    font-size: 12px; line-height: 1.45; margin-top: 6px;
  }
  .coach-warning { color: var(--danger); font-size: 12px; line-height:1.5; margin-top: 10px; }
  .template-phase { color: var(--accent); font-size: 11px; font-family:'JetBrains Mono', monospace; margin-top: 3px; }

  /* FIX: coach done badge */
  .coach-done-badge {
    background: rgba(212,255,58,0.12); border: 1px solid var(--accent);
    border-radius: 10px; padding: 10px 14px;
    color: var(--accent); font-size: 13px; font-weight: 600;
    text-align: center; margin-bottom: 10px;
  }

  /* ===== REST TIMER (新增) ===== */
  .rest-timer-bar {
    position: fixed; bottom: calc(76px + env(safe-area-inset-bottom));
    left: 12px; right: 12px; z-index: 40;
    background: var(--surface-2); border: 1px solid var(--accent);
    border-radius: 16px; padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 4px 24px rgba(212,255,58,0.15);
  }
  .rest-timer-bar.hidden { display: none; }
  .timer-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; color: var(--accent); min-width: 54px; line-height: 1;
  }
  .timer-track {
    flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .timer-fill {
    height: 100%; background: var(--accent); border-radius: 2px;
    transition: width 1s linear;
  }
  .timer-btns { display: flex; gap: 6px; }
  .timer-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px;
    color: var(--text-dim); font-size: 12px; font-weight: 600;
  }
  .timer-btn.active { border-color: var(--accent); color: var(--accent); }
  .timer-close {
    background: none; border: none; color: var(--text-dim); font-size: 18px; padding: 2px 4px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">// TRAINING LOG</div>
  <h1>IRON<span>.</span>COACH</h1>
</div>

<div class="container" id="app"></div>

<!-- 休息计时器 (新增) -->
<div class="rest-timer-bar hidden" id="restTimerBar">
  <div style="display:flex;flex-direction:column;gap:2px">
    <div style="font-size:9px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;letter-spacing:0.15em">REST</div>
    <div class="timer-display" id="timerDisplay">1:30</div>
  </div>
  <div class="timer-track"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
  <div class="timer-btns">
    <button class="timer-btn tap" id="timerBtn60" onclick="setTimer(60)">60s</button>
    <button class="timer-btn tap" id="timerBtn90" onclick="setTimer(90)">90s</button>
    <button class="timer-btn tap" id="timerBtn120" onclick="setTimer(120)">120s</button>
  </div>
  <button class="timer-close tap" onclick="stopTimer()">×</button>
</div>

<nav class="bottom-nav" id="nav">
  <button data-tab="today" class="active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
    <span>今日</span>
  </button>
  <button data-tab="history">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
    <span>历史</span>
  </button>
  <button data-tab="weight">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M16 8l-4 4-4-4"/></svg>
    <span>体重</span>
  </button>
  <button data-tab="measurements">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16"/><path d="M6 7v10a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7"/><path d="M9 7V5a3 3 0 0 1 6 0v2"/></svg>
    <span>身材</span>
  </button>
  <button data-tab="templates">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
    <span>计划</span>
  </button>
</nav>

<script>
// ============ STATE ============
const DEFAULT_EXERCISES = [
  "高脚杯深蹲", "史密斯深蹲", "腿举", "卧推", "器械胸推", "上斜哑铃卧推",
  "高位下拉", "坐姿划船", "罗马尼亚硬拉", "臀桥", "哑铃肩推", "侧平举",
  "面拉", "二头弯举", "绳索下压", "腿弯举", "提踵", "平板支撑"
];

const DEFAULT_TEMPLATES = [
  { id: "coach-push-a", phase: "第1-2周 · 重启视觉线", name: "Push A｜上胸肩宽启动", exercises: [
    { name: "上斜器械推 / 上斜哑铃推", sets: 3, reps: "8-10｜RIR 3" },
    { name: "器械胸推 / 俯卧撑", sets: 2, reps: "10-12｜RIR 3" },
    { name: "坐姿肩推", sets: 2, reps: "8-10｜RIR 3" },
    { name: "绳索侧平举", sets: 4, reps: "12-20｜控制" },
    { name: "绳索下压", sets: 3, reps: "10-15" },
    { name: "平板支撑", sets: 2, reps: "30-45秒" },
  ]},
  { id: "coach-pull-a", phase: "第1-2周 · 倒三角重启", name: "Pull A｜背阔后束启动", exercises: [
    { name: "高位下拉", sets: 3, reps: "8-12｜RIR 3" },
    { name: "坐姿划船", sets: 3, reps: "10-12｜RIR 3" },
    { name: "单臂下拉 / 直臂下压", sets: 2, reps: "12-15" },
    { name: "反向飞鸟 / 面拉", sets: 3, reps: "15-20" },
    { name: "哑铃弯举", sets: 3, reps: "10-15" },
    { name: "锤式弯举", sets: 2, reps: "12-15" },
  ]},
  { id: "coach-leg-easy", phase: "第1-2周 · 保安腿部最低有效量", name: "Legs Easy｜腿不练废", exercises: [
    { name: "腿举 / 史密斯深蹲", sets: 2, reps: "10-12｜RIR 3" },
    { name: "罗马尼亚硬拉", sets: 2, reps: "8-10｜轻重量" },
    { name: "腿弯举", sets: 2, reps: "12-15" },
    { name: "提踵", sets: 3, reps: "12-20" },
    { name: "死虫 / 卷腹", sets: 2, reps: "12-15" },
  ]},
  { id: "coach-pump", phase: "低恢复 · 泵感保底", name: "Pump｜低睡眠保底训练", exercises: [
    { name: "绳索侧平举", sets: 4, reps: "15-25｜不力竭" },
    { name: "高位下拉", sets: 2, reps: "12-15｜轻" },
    { name: "器械胸推", sets: 2, reps: "12-15｜轻" },

function mergeTemplates(saved) {
  const byId = new Map(DEFAULT_TEMPLATES.map(t => [t.id, t]));
  (Array.isArray(saved) ? saved : []).forEach(t => {
    if (t && t.id && !byId.has(t.id)) byId.set(t.id, t);
  });
  return [...byId.values()];
}

function defaultCoachState() {
  return { active: true, startedAt: todayStr(), completed: 0, lastFatigue: "一般", shift:"白班", sleep:">7h", lastAdvice: [] };
}

function safeLoad(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    if (raw === null) return fallback;
    const parsed = JSON.parse(raw);
    return parsed ?? fallback;
  } catch (err) {
    console.warn(`[Iron Journal] ${key} 数据损坏，已使用默认值`, err);
    return fallback;
  }
}

let storageWarningShown = false;
function safeSet(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
    return true;
  } catch (err) {
    if (!storageWarningShown) {
      storageWarningShown = true;
      alert("保存失败：浏览器本地存储不可用或空间已满。请先导出备份，再清理空间。");
    }
    console.error(err);
    return false;
  }
}

  if (!c) return defaultCoachState();
  const maxSessions = coachTotalSessions();
  return { ...defaultCoachState(), ...c, completed: Math.min(Math.max(0, Number(c.completed) || 0), maxSessions) };
}

function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

function parseLocalDate(s) {
  if (!/^\d{4}-\d{2}-\d{2}$/.test(String(s))) return new Date(s);
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d);
}

const fmtDate = (s) => { const d = parseLocalDate(s); return `${d.getMonth() + 1}月${d.getDate()}日`; };

// ============ REST TIMER (FIX #8 新增) ============
const timerState = { active: false, total: 90, remaining: 90, interval: null, preset: 90 };

function setTimer(seconds) {
  clearInterval(timerState.interval);
  timerState.total = seconds;
  timerState.remaining = seconds;
  timerState.preset = seconds;
  timerState.active = true;
  updateTimerUI();
  document.getElementById("restTimerBar").classList.remove("hidden");
  // highlight active preset button
  [60,90,120].forEach(s => {
    const btn = document.getElementById("timerBtn" + s);
    if (btn) btn.classList.toggle("active", s === seconds);
  });
  timerState.interval = setInterval(() => {
    timerState.remaining--;
    if (timerState.remaining <= 0) {
      timerState.remaining = 0;
      clearInterval(timerState.interval);
      timerState.active = false;
      // vibrate if supported
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }
    updateTimerUI();
  }, 1000);
}

function updateTimerUI() {
  const disp = document.getElementById("timerDisplay");
  const fill = document.getElementById("timerFill");
  if (!disp) return;
  const m = Math.floor(timerState.remaining / 60);
  const s = timerState.remaining % 60;
  disp.textContent = `${m}:${String(s).padStart(2,"0")}`;
  const pct = timerState.total > 0 ? (timerState.remaining / timerState.total * 100) : 0;
  if (fill) fill.style.width = pct + "%";
  // color pulse when done
  if (disp) disp.style.color = timerState.remaining === 0 ? "var(--danger)" : "var(--accent)";
}

function stopTimer() {
  clearInterval(timerState.interval);
  timerState.active = false;
  document.getElementById("restTimerBar").classList.add("hidden");
}

// ============ COACH ============
function getCoachProgress() {
  const completed = Math.max(0, Number(state.coach?.completed || 0));
  let remain = completed;
  for (let w = 0; w < RETURN_PLAN.weekly.length; w++) {
    const days = RETURN_PLAN.weekly[w].length;
    if (remain < days) {
      const templateId = RETURN_PLAN.weekly[w][remain];
      return { week: w + 1, day: remain + 1, totalDays: days, completed, template: state.templates.find(t => t.id === templateId) };
    }
    remain -= days;
  }
  return { week: RETURN_PLAN.weekly.length, day: RETURN_PLAN.weekly[RETURN_PLAN.weekly.length-1].length, totalDays: RETURN_PLAN.weekly[RETURN_PLAN.weekly.length-1].length, completed, template: state.templates.find(t => t.id === "coach-shoulder-arm"), done: true };
}

function coachDecision() {
  const p = getCoachProgress();
  const shift = state.coach?.shift || "白班";
  const sleep = state.coach?.sleep || ">7h";
  const fatigue = state.coach?.lastFatigue || "一般";
  // FIX #1: 区分"原计划模板"和"实际执行模板"，只有原计划模板才推进进度
  const plannedTemplate = p.template || state.templates.find(t => t.id === "coach-push-a");
  let template = plannedTemplate;
  let mode = "标准推进";
  let note = "按计划推进，复合动作保留2次余力，孤立动作保留1次余力。";
  let volume = 1;
  let isOffPlan = false; // 标记是否偏离了原计划（不应推进进度）

  if (sleep === "<5h" || fatigue === "很差") {
    template = state.templates.find(t => t.id === "coach-pump") || template;
    mode = "恢复保底";
    note = "禁止重训。只做肩背手臂泵感，目的是保持节奏，不是硬刚。";
    volume = 0.55;
    isOffPlan = true;
  } else if (shift === "白班" && sleep === "5-7h") {
    template = state.templates.find(t => t.id === "coach-pump") || template;
    mode = "白班减量";
    note = "白班后恢复差，今天只做上肢泵感。不练腿，不冲重量。";
    volume = 0.7;
    isOffPlan = true;
  } else if (shift === "白班" && template?.id?.includes("leg")) {
    template = state.templates.find(t => t.id === "coach-pump") || template;
    mode = "避开腿部";
    note = "白班长时间站立后不安排腿部重训，避免第二天崩盘。";
    volume = 0.7;
    isOffPlan = true;
  } else if (shift === "夜班") {
    mode = "夜班黄金窗";
    note = "睡醒、吃完再练。可以完整训练，但不要力竭。";
    volume = 1;
  } else if (shift === "休息" && sleep === ">7h") {
    mode = "高恢复推进";
    note = "今天是最适合推进的窗口。动作标准前提下可小幅加重量。";
    volume = 1;
  } else if (sleep === "5-7h") {
    mode = "轻减量";
    note = "每个动作少做1组，重量不加。";
    volume = 0.8;
  }
  return { ...p, template, mode, note, volume, isOffPlan };
}

function renderCoachCalendar() {
  const p = coachDecision();
  const rows = [];
  const labels = ["今天", "下次", "第3次"];
  for (let i = 0; i < 3; i++) {
    const idx = Math.min((state.coach?.completed || 0) + i, coachTotalSessions() - 1);
    let remain = idx;
    let tplId = RETURN_PLAN.weekly[0][0];
    for (let w = 0; w < RETURN_PLAN.weekly.length; w++) {
      if (remain < RETURN_PLAN.weekly[w].length) { tplId = RETURN_PLAN.weekly[w][remain]; break; }
      remain -= RETURN_PLAN.weekly[w].length;
    }
    const tpl = state.templates.find(t => t.id === tplId);
    rows.push(`<div class="tpl-ex-row"><span>${labels[i]}</span><span class="reps">${esc(tpl?.name || "恢复训练")}</span></div>`);
  }
  return `<div class="template-card" style="margin-top:-10px;margin-bottom:24px">
    <div style="font-weight:700;font-size:15px;margin-bottom:6px">智能训练日历</div>
    <div class="data-note" style="margin-top:0;margin-bottom:8px">按当前计划顺序预测。白班、低睡眠、疲劳差时，今日卡片会自动降级为 Pump 或休息。</div>
    ${rows.join("")}
  </div>`;
}

function renderCoachCard() {
  const p = coachDecision();
  const phase = p.template?.phase || "恢复训练";
  const name = p.done ? "计划已完成，可重置重新开始" : p.template?.name;
  const weeklyTarget = p.week <= 2 ? "3练/周" : (p.week <= 4 ? "3练/周" : "4练/周");
  const advice = Array.isArray(state.coach?.lastAdvice) && state.coach.lastAdvice.length

function targetTopRep(target) {
  const m = String(target || "").match(/(\d+)\s*-\s*(\d+)/);
  if (m) return Number(m[2]);
  const nums = String(target || "").match(/\d+/g);
  return nums ? Number(nums[nums.length - 1]) : null;
}

function buildProgressionAdvice(workout) {
  const advice = [];
  workout.exercises.forEach(ex => {
    const top = targetTopRep(ex.targetReps);
    const targetSets = Number(ex.targetSets || 0);
    if (!top || !targetSets || !ex.sets || ex.sets.length < targetSets) return;
    const valid = ex.sets.filter(s => Number(s.weight) > 0 && Number(s.reps) > 0);
    if (valid.length < targetSets) return;
    const completedTop = valid.slice(0, targetSets).every(s => Number(s.reps) >= top);
    const heavy = /卧推|深蹲|腿举|硬拉|划船|下拉|肩推|推/.test(ex.name);
    if (completedTop) {
      advice.push(`${ex.name}：目标次数已完成，下次${heavy ? "+2.5kg" : "先+2次或+1kg"}。`);
    } else {
      advice.push(`${ex.name}：保持重量，先把动作和次数做满。`);
    }
  });
  return advice.length ? advice : ["这次记录不足以判断进阶。下次把重量和次数填完整。"];
}

window.cancelSession = () => { state.currentWorkout = null; render(); };

function isEffectiveWorkout(w) {
  const validSets = w.exercises.flatMap(e => e.sets || []).filter(s => (Number(s.weight)||0) > 0 && (Number(s.reps)||0) > 0);
  const validExercises = w.exercises.filter(e => (e.sets || []).some(s => (Number(s.weight)||0) > 0 && (Number(s.reps)||0) > 0));
  return validSets.length >= 3 && validExercises.length >= 2;
}

window.saveSession = () => {
  const w = state.currentWorkout;
  w.exercises = w.exercises.map(e => ({
    ...e,
    sets: e.sets.map(s => ({ weight: Number(s.weight) || 0, reps: Number(s.reps) || 0 })),
  }));
  const hasValidSet = w.exercises.some(e => e.sets.some(s => (Number(s.weight)||0) > 0 && (Number(s.reps)||0) > 0));
  if (!hasValidSet) {
    alert("至少记录一组有效重量和次数");
    return;
  }
  const existed = state.workouts.some(x => x.id === w.id);
  state.workouts = [w, ...state.workouts.filter(x => x.id !== w.id)];
  // FIX #1: 只有 coachSession 且不是 offPlan 的训练才推进进度
  if (w.coachSession && !w.isOffPlan && !existed && isEffectiveWorkout(w)) {
    state.coach.completed = Math.min((state.coach.completed || 0) + 1, coachTotalSessions());
    state.coach.lastAdvice = buildProgressionAdvice(w);
  }
  save();
  state.currentWorkout = null;
  stopTimer(); // 保存后关掉计时器
  render();
};

window.removeExercise = (i) => {
  state.currentWorkout.exercises.splice(i, 1);
  render();
};

window.addSet = (i) => {
  const ex = state.currentWorkout.exercises[i];
  const last = ex.sets[ex.sets.length - 1];
  ex.sets.push({ weight: last?.weight || 0, reps: last?.reps || 0 });
  render();
  // 聚焦到新添加的组的重量输入框
  setTimeout(() => {
    const newSetIdx = ex.sets.length - 1;
    const inputs = app.querySelectorAll(`[data-exidx="${i}"][data-setidx="${newSetIdx}"][data-field="weight"]`);
    if (inputs.length) inputs[0].focus();
  }, 50);
};

window.removeSet = (e, s) => {
  state.currentWorkout.exercises[e].sets.splice(s, 1);
  render();
};

  customAddBtn.addEventListener("click", () => {

// ============ HISTORY ============
function getExerciseStats() {
  const map = {};
  state.workouts.forEach(w => {
    w.exercises.forEach(e => {
      if (!map[e.name]) map[e.name] = [];
      e.sets.forEach(s => {
        if (s.weight && s.reps) {
          map[e.name].push({ date: w.date, weight: s.weight, reps: s.reps });
        }
      });
    });
  });
  return map;
}

function renderHistory() {
  const stats = getExerciseStats();
  let html = `<div class="card-anim"><div class="section-title">— 动作进步</div>`;

  if (Object.keys(stats).length === 0) {
    html += `<div class="empty-card" style="margin-bottom:24px">完成训练后这里会显示进步图表</div>`;
  } else {
    Object.keys(stats).forEach(name => {
      const sets = stats[name];
      const maxW = Math.max(...sets.map(s => s.weight));
      // FIX #7: data-name 代替 onclick 传字符串
      html += `<button class="ex-list-item tap" data-name="${esc(name)}" data-action="showExDetail">
        <div>
          <div style="font-weight:600;font-size:15px">${esc(name)}</div>
          <div style="color:var(--text-dim);font-size:11px;font-family:'JetBrains Mono',monospace;margin-top:2px">${sets.length} 组 · 最大 ${maxW}kg</div>
        </div>
        <span style="color:var(--accent)">${ICONS.chevron}</span>
      </button>`;
    });
  }

  html += `<div class="section-title" style="margin-top:24px">— 训练记录</div>`;
  if (state.workouts.length === 0) {
    html += `<div class="empty-card">还没有训练记录</div>`;
  } else {
    state.workouts.forEach(w => {
      const sets = w.exercises.reduce((s, e) => s + e.sets.length, 0);

        <div style="flex:1;cursor:pointer" data-id="${esc(w.id)}" data-action="editWorkout">

function renderExerciseDetail() {

  const byDate = {};
  stats.forEach(d => {
    if (!byDate[d.date] || byDate[d.date] < d.weight) byDate[d.date] = d.weight;
  });
  const points = Object.keys(byDate).sort().map(date => ({ date, weight: byDate[date] }));

  let html = `<div class="card-anim">
    <button class="back-btn tap" id="backDetailBtn">← 返回</button>
    <h2 style="font-family:'Bebas Neue',sans-serif;font-size:32px;margin:0 0 4px">${esc(name)}</h2>

  if (points.length > 1) {
    html += `<div class="chart-card">
      <div class="chart-label">最大重量趋势</div>
      <canvas id="chart"></canvas>
    </div>`;
  } else {
    html += `<div class="empty-card" style="margin-bottom:20px">需要至少两次训练数据才能显示图表</div>`;
  }

  html += `<div class="section-title">— 历史记录</div>`;
  stats.slice().reverse().forEach(d => {
    html += `<div class="history-row">
      <div style="color:var(--text-dim);font-size:13px;font-family:'JetBrains Mono',monospace">${fmtDate(d.date)}</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:14px">
        <span style="color:var(--accent);font-weight:700">${d.weight}</span><span style="color:var(--text-dim)">kg × </span><span style="color:var(--accent);font-weight:700">${d.reps}</span>

    </div>`;
  });

  html += `</div>`;
  app.innerHTML = html;
  document.getElementById("backDetailBtn").addEventListener("click", () => { state.selectedExercise = null; render(); });

  if (points.length > 1) drawChart("chart", points.map(p => fmtDate(p.date)), points.map(p => p.weight));
}

// ============ WEIGHT ============
function renderWeight() {
  const latest = state.weights[0];
  const oldest = state.weights[state.weights.length - 1];
  const change = (latest && oldest && state.weights.length > 1) ? (latest.value - oldest.value).toFixed(1) : null;
  // FIX #3: 体重变化用中性颜色（蓝/橙），不做增肥=坏的主观判断
  const changeColor = change === null ? '' : (Number(change) > 0 ? '#4FC3F7' : 'var(--accent)');

  let html = `<div class="card-anim">
    <div class="weight-current">
      <div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:0.2em;margin-bottom:4px">CURRENT</div>
        <div class="weight-big">${latest ? latest.value : "—"}<span class="kg">kg</span></div>
        ${change !== null ? `<div style="margin-top:4px;font-size:12px;color:${changeColor};font-family:'JetBrains Mono',monospace">${Number(change) > 0 ? '+' : ''}${change}kg 累计变化</div>` : ''}
      </div>
      <button class="tap" id="showWeightModalBtn" style="background:var(--accent);color:#000;border:none;border-radius:14px;padding:14px;display:flex;align-items:center;gap:4px;font-weight:700">
        ${ICONS.plus} 记录
      </button>
    </div>`;

  if (state.weights.length > 1) {
    html += `<div class="chart-card"><canvas id="wchart"></canvas></div>`;
  }

  html += `<div class="section-title">— 记录历史</div>`;
  if (state.weights.length === 0) {

window.showWeightModal = () => {
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.id = "weightModal";

  modal.className = "modal";

  const handle = document.createElement("div"); handle.className = "modal-handle";
  const title = document.createElement("h3"); title.textContent = "今日体重";
  const input = document.createElement("input");
  input.id = "weightInput"; input.className = "input-text";

  const btn = document.createElement("button");
  btn.className = "btn-primary tap"; btn.style.padding = "14px"; btn.textContent = "保存";
  btn.addEventListener("click", () => {

    if (!v || v <= 0) return;
    const today = todayStr();
    state.weights = [{ date: today, value: v }, ...state.weights.filter(w => w.date !== today)]
      .sort((a, b) => b.date.localeCompare(a.date));
    save();
    overlay.remove();
    render();
  });

};

// ============ DATA BACKUP ============
window.exportData = () => {
  const payload = {
    app: APP_META.name,
    version: APP_META.version,
    exportedAt: new Date().toISOString(),
    workouts: state.workouts,
    weights: state.weights,
    measurements: state.measurements,
    templates: state.templates,
    coach: state.coach,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `iron-journal-backup-${todayStr()}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
};

window.importData = (event) => {
  const file = event.target.files?.[0];
  event.target.value = "";
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (data.app !== APP_META.name || !data.version || !Array.isArray(data.workouts) || !Array.isArray(data.weights)) {
        throw new Error("不是有效的 Iron Journal 备份文件");
      }
      const importedMeasurements = Array.isArray(data.measurements) ? data.measurements : [];
      // FIX #10: 提供合并导入选项
      const choice = confirm("选择导入方式：\n\n确定 = 合并（按 ID 去重，保留本地新记录）\n取消 = 覆盖（完全替换当前数据）");
      if (choice) {
        // 合并模式：按 ID 去重
        const existingIds = new Set(state.workouts.map(w => w.id));
        const newWorkouts = data.workouts.filter(w => !existingIds.has(w.id));
        state.workouts = [...state.workouts, ...newWorkouts].sort((a, b) => b.date.localeCompare(a.date));
        const existingDates = new Set(state.weights.map(w => w.date));
        const newWeights = data.weights.filter(w => !existingDates.has(w.date));
        state.weights = [...state.weights, ...newWeights].sort((a, b) => b.date.localeCompare(a.date));
        const existingMeasureDates = new Set(state.measurements.map(m => m.date));
        const newMeasurements = importedMeasurements.filter(m => !existingMeasureDates.has(m.date));
        state.measurements = [...state.measurements, ...newMeasurements].sort((a, b) => b.date.localeCompare(a.date));
        if (Array.isArray(data.templates)) {
          const tplMap = new Map(state.templates.map(t => [t.id, t]));
          data.templates.forEach(t => { if (t && t.id && !tplMap.has(t.id)) tplMap.set(t.id, t); });
          state.templates = [...tplMap.values()];
        }
        alert(`合并完成：新增 ${newWorkouts.length} 次训练记录。`);
      } else {
        if (!confirm("覆盖会完全清除当前本地数据，确认继续？")) return;
        state.workouts = data.workouts;
        state.weights = data.weights;
        state.templates = (Array.isArray(data.templates) && data.templates.length) ? data.templates : DEFAULT_TEMPLATES;
        if (data.coach) state.coach = sanitizeCoach(data.coach);
        alert("覆盖导入完成");
      }
      save();
      render();
    } catch (err) {
      alert("导入失败：这不是有效的 Iron Journal 备份文件。");
      console.error(err);
    }
  };
  reader.readAsText(file);
};

  const t = state.editingTemplate;
  if (!t.name.trim()) return;
  const exists = state.templates.find(x => x.id === t.id);
  delete t.isNew;
  if (exists) {
    state.templates = state.templates.map(x => x.id === t.id ? t : x);
  } else {
    state.templates = [...state.templates, t];
  }
  save();
  state.editingTemplate = null;
  render();
};

// ============ CHART (simple canvas) ============
function drawChart(id, labels, values) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const pad = { l: 36, r: 16, t: 12, b: 24 };
  const min = Math.min(...values) - (Math.max(...values) - Math.min(...values)) * 0.15 - 0.5;
  const max = Math.max(...values) + (Math.max(...values) - Math.min(...values)) * 0.15 + 0.5;
  const range = max - min || 1;
  const xStep = (W - pad.l - pad.r) / Math.max(1, values.length - 1);

  ctx.strokeStyle = "#2A2A2A";
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 3]);
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + (H - pad.t - pad.b) * i / 4;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
  }
  ctx.setLineDash([]);

  ctx.fillStyle = "#8A8A8A";
  ctx.font = "11px 'JetBrains Mono', monospace";
  ctx.textAlign = "right";
  for (let i = 0; i <= 4; i++) {
    const v = max - range * i / 4;
    const y = pad.t + (H - pad.t - pad.b) * i / 4;
    ctx.fillText(v.toFixed(1), pad.l - 6, y + 4);
  }

  ctx.textAlign = "center";
  const skip = Math.ceil(labels.length / 6);
  labels.forEach((l, i) => {
    if (i % skip !== 0 && i !== labels.length - 1) return;
    ctx.fillText(l, pad.l + i * xStep, H - 6);
  });

  ctx.strokeStyle = "#D4FF3A";
  ctx.lineWidth = 2.5; ctx.lineJoin = "round";
  ctx.beginPath();
  values.forEach((v, i) => {
    const x = pad.l + i * xStep;
    const y = pad.t + (H - pad.t - pad.b) * (1 - (v - min) / range);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  ctx.fillStyle = "#D4FF3A";
  values.forEach((v, i) => {
    const x = pad.l + i * xStep;
    const y = pad.t + (H - pad.t - pad.b) * (1 - (v - min) / range);
    ctx.beginPath(); ctx.arc(x, y, 3.5, 0, Math.PI * 2); ctx.fill();
  });
}
